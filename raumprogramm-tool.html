function getOutletSummaryLine(outlet, info){
  if(info.kind === 'meeting_events'){
    if(outlet.meetingRooms.length === 0) return {label:info.label, value:'keine Räume konfiguriert'};
    const groups = {};
    const order = [];
    for(let i=0;i<outlet.meetingRooms.length;i++){
      const r = outlet.meetingRooms[i];
      const label = roomTypeLabel(r.type);
      if(!groups[label]){ groups[label] = []; order.push(label); }
      groups[label].push(parseNum(r.qm));
    }
    const parts = [];
    for(let i=0;i<order.length;i++){
      const label = order[i];
      const sizes = groups[label].map(function(v){return v+' m²';}).join(', ');
      parts.push(groups[label].length+'x '+label+' ('+sizes+')');
    }
    return {label:info.label, value:parts.join(', ')};
  }
  if(info.kind === 'restaurant' || info.kind === 'bar' || info.kind === 'lounge'){
    const r = outlet[info.kind];
    if(r.sitzbereich.mode === 'calc' && parseNum(r.sitzbereich.anzahl)>0){
      return {label:info.label, value:parseNum(r.sitzbereich.anzahl)+' Sitzplätze'};
    } else if(r.sitzbereich.mode === 'qm' && parseNum(r.sitzbereich.qm)>0){
      return {label:info.label, value:parseNum(r.sitzbereich.qm)+' m² Sitzbereich'};
    }
    return {label:info.label, value:'–'};
  }
  return {label:info.label, value:'–'};
}

function generateDashboardPDF(d, kategorien, roomCount, parkplaetzeTotal, ngfTotal, bgfTotal, umrechnung, pubTotal, bohTotal, fohPct, bohPct){
  if(!window.jspdf){
    alert('PDF-Bibliothek konnte nicht geladen werden. Bitte Internetverbindung prüfen und erneut versuchen.');
    return;
  }
  const doc = new window.jspdf.jsPDF();
  const pageHeight = doc.internal.pageSize.getHeight();
  const marginLeft = 15;
  let y = 20;

  function checkPage(extra){
    if(y + (extra||10) > pageHeight - 15){
      doc.addPage();
      y = 20;
    }
  }

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.text('Raumprogramm – Dashboard', marginLeft, y);
  y += 10;

  doc.setFontSize(11);
  doc.setFont('helvetica', 'normal');
  doc.text('Erstellt am: '+getTodayString(), marginLeft, y);
  y += 10;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13);
  doc.text('Projektinformationen', marginLeft, y);
  y += 7;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10.5);
  const infoLines = [
    'Projekt: '+(d.projektname||'–'),
    'Standort: '+(d.stadt||'–')+(d.land?', '+d.land:''),
    'Typ: '+(d.typ||'–')+'   |   Klassifizierung: '+(d.klassifizierung||'–'),
    'Gästeetagen: '+(data.flur.etagen||'–')+'   |   Zimmer gesamt: '+roomCount,
    'Parkplätze: '+(parkplaetzeTotal||'–')
  ];
  for(let i=0;i<infoLines.length;i++){ checkPage(); doc.text(infoLines[i], marginLeft, y); y += 6; }
  y += 4;

  if(data.fnb.outlets.length>0){
    checkPage(10);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.text('Outlets', marginLeft, y);
    y += 7;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10.5);
    for(let i=0;i<data.fnb.outlets.length;i++){
      const outlet = data.fnb.outlets[i];
      const info = outletTypeInfo(outlet.type);
      const s = getOutletSummaryLine(outlet, info);
      const lines = doc.splitTextToSize(s.label+': '+s.value, 180);
      for(let l=0;l<lines.length;l++){ checkPage(); doc.text(lines[l], marginLeft, y); y += 6; }
    }
    y += 4;
  }

  checkPage(14);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13);
  doc.text('Flächenübersicht nach Bereich (NGF)', marginLeft, y);
  y += 8;
  doc.setFontSize(10.5);
  for(let i=0;i<kategorien.length;i++){
    checkPage();
    doc.setFont('helvetica', 'normal');
    doc.text(kategorien[i].label, marginLeft, y);
    doc.text(Math.round(kategorien[i].detail.total)+' m²', 170, y, {align:'right'});
    y += 6;
    for(let r=0;r<kategorien[i].detail.rows.length;r++){
      checkPage();
      doc.setFontSize(9);
      doc.setTextColor(110,110,110);
      const row = kategorien[i].detail.rows[r];
      const lines = doc.splitTextToSize('– '+row.label, 140);
      for(let l=0;l<lines.length;l++){ checkPage(); doc.text(lines[l], marginLeft+4, y); doc.text(Math.round(row.val)+' m²', 170, y, {align:'right'}); y += 5; }
      doc.setFontSize(10.5);
      doc.setTextColor(0,0,0);
    }
    y += 2;
  }

  y += 4;
  checkPage(30);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.text('Gesamt NGF: '+Math.round(ngfTotal)+' m²', marginLeft, y); y += 7;
  doc.text('Gesamt BGF (Faktor '+umrechnung+'): '+Math.round(bgfTotal)+' m²', marginLeft, y); y += 7;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10.5);
  doc.text('Front of House: '+Math.round(pubTotal)+' m² ('+Math.round(fohPct)+'%)', marginLeft, y); y += 6;
  doc.text('Back of House: '+Math.round(bohTotal)+' m² ('+Math.round(bohPct)+'%)', marginLeft, y); y += 6;
  if(roomCount>0){
    doc.text('Ø m² NGF pro Zimmer: '+Math.round(ngfTotal/roomCount)+' m²', marginLeft, y); y += 6;
    doc.text('Ø m² BGF pro Zimmer: '+Math.round(bgfTotal/roomCount)+' m²', marginLeft, y); y += 6;
  }

  const filename = 'Raumprogramm-'+(d.projektname?d.projektname.replace(/[^a-z0-9]/gi,'_'):'Dashboard')+'.pdf';
  doc.save(filename);
}

      '<div class="dash-grid">'+
        '<div class="dash-stat"><div class="label">Projekt</div><div class="value">'+(d.projektname||'–')+'</div></div>'+
        '<div class="dash-stat"><div class="label">Standort</div><div class="value">'+(d.stadt||'–')+(d.land?', '+d.land:'')+'</div></div>'+
        '<div class="dash-stat"><div class="label">Typ</div><div class="value">'+(d.typ||'–')+'</div></div>'+
        '<div class="dash-stat"><div class="label">Klassifizierung</div><div class="value">'+(d.klassifizierung||'–')+'</div></div>'+
        '<div class="dash-stat"><div class="label">Gästeetagen</div><div class="value">'+(data.flur.etagen||'–')+'</div></div>'+
        '<div class="dash-stat"><div class="label">Zimmer gesamt</div><div class="value">'+roomCount+'</div></div>'+
        '<div class="dash-stat"><div class="label">Parkplätze</div><div class="value">'+(parkplaetzeTotal||'–')+'</div></div>'+
      '</div>'+
      (outletLinesHtml ? '<div style="margin-top:20px;"><div style="font-size:12px;font-weight:600;color:var(--primary);text-transform:uppercase;margin-bottom:8px;">Outlets</div><div class="dash-grid">'+outletLinesHtml+'</div></div>' : '')+
    '</div>'+
    '<div class="card" style="margin-top:24px;">'+
      '<h2>Flächenverteilung</h2>'+
      '<p class="hint">Relative Flächenanteile nach Hauptbereich (NGF). Klicke auf "+", um Einzelflächen zu sehen.</p>'+
      barsHtml+
      '<div style="border-top:1.5px solid var(--border);margin:24px 0 20px;"></div>'+
      '<div style="font-size:12px;font-weight:600;color:var(--primary);text-transform:uppercase;margin-bottom:12px;">Verhältnis Front of House zu Back of House</div>'+
      '<div style="display:flex;height:24px;border-radius:6px;overflow:hidden;margin-bottom:10px;">'+
        '<div style="background:var(--primary);width:'+fohPct+'%;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;">'+(fohPct>10?Math.round(fohPct)+'%':'')+'</div>'+
        '<div style="background:var(--accent-brown);width:'+bohPct+'%;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;">'+(bohPct>10?Math.round(bohPct)+'%':'')+'</div>'+
      '</div>'+
      '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);">'+
        '<span><span style="display:inline-block;width:10px;height:10px;background:var(--primary);border-radius:2px;margin-right:6px;"></span>Front of House: '+Math.round(pubTotal)+' m²</span>'+
        '<span><span style="display:inline-block;width:10px;height:10px;background:var(--accent-brown);border-radius:2px;margin-right:6px;"></span>Back of House: '+Math.round(bohTotal)+' m²</span>'+
      '</div>'+
      '<div style="border-top:1.5px solid var(--border);margin:24px 0 20px;"></div>'+
      '<div class="total-bar"><span class="lbl">Gesamt NGF</span><span class="val">'+Math.round(ngfTotal)+' m²</span></div>'+
      '<div class="total-bar" style="background:var(--accent-brown);"><span class="lbl">Gesamt BGF (Faktor '+umrechnung+')</span><span class="val">'+Math.round(bgfTotal)+' m²</span></div>'+
      '<div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;">'+
        '<div style="padding:14px;background:white;border:1px solid var(--border);border-radius:8px;text-align:center;">'+
          '<div style="font-size:11px;font-weight:600;color:var(--primary);text-transform:uppercase;margin-bottom:6px;">Ø m² NGF / Zimmer</div>'+
          '<div style="font-size:18px;font-weight:700;color:var(--primary);">'+(roomCount>0 ? Math.round(ngfTotal/roomCount) : '–')+' m²</div>'+
        '</div>'+
        '<div style="padding:14px;background:white;border:1px solid var(--border);border-radius:8px;text-align:center;">'+
          '<div style="font-size:11px;font-weight:600;color:var(--primary);text-transform:uppercase;margin-bottom:6px;">Ø m² BGF / Zimmer</div>'+
          '<div style="font-size:18px;font-weight:700;color:var(--primary);">'+(roomCount>0 ? Math.round(bgfTotal/roomCount) : '–')+' m²</div>'+
        '</div>'+
      '</div>'+
      '<button class="btn-primary" id="btn-dashboard-print" style="margin-top:20px;width:100%;">Drucken / als PDF</button>'+
    '</div>';

  const printBtn = document.getElementById('btn-dashboard-print');
  if(printBtn){
    printBtn.addEventListener('click', function(){
      generateDashboardPDF(d, kategorien, roomCount, parkplaetzeTotal, ngfTotal, bgfTotal, umrechnung, pubTotal, bohTotal, fohPct, bohPct);
    });
  }

  const toggles = contentEl.querySelectorAll('.dash-toggle');
  for(let i=0;i<toggles.length;i++){
    toggles[i].addEventListener('click', function(){
      const key = this.dataset.key;
      const row = document.getElementById('dash-detail-'+key);
      const btn = this.querySelector('.dash-expand-btn');
      const isOpen = row.style.display !== 'none';
      row.style.display = isOpen ? 'none' : 'block';
      btn.textContent = isOpen ? '+' : '−';
    });
  }
}

/* ============ PLACEHOLDER ============ */
function renderPlaceholder(step){
  contentEl.innerHTML =
    '<div class="card"><div class="placeholder-box"><span class="emoji">🚧</span><h2>'+step.label.replace('<br>','')+'</h2><p>Dieser Abschnitt wird im nächsten Arbeitsschritt gemeinsam aufgebaut.</p></div></div>';
}

/* ============ ROUTER ============ */
function renderContent(){
  const step = STEPS[current];
  if(step.id === 'projekt'){ renderProjekt(); }
  else if(step.id === 'zimmer'){ renderZimmer(); }
  else if(step.id === 'oeffentlich'){ renderOeffentlich(); }
  else if(step.id === 'fnb'){ renderFnb(); }
  else if(step.id === 'wellness'){ renderWellness(); }
  else if(step.id === 'retail'){ renderRetail(); }
  else if(step.id === 'infrastruktur'){ renderInfrastruktur(); }
  else if(step.id === 'arbeitsplaetze'){ renderArbeitsplaetze(); }
  else if(step.isDashboard){
    try{ renderDashboard(); }
    catch(err){
      contentEl.innerHTML = '<div class="card"><h2>Dashboard – Fehler</h2><p class="hint">Beim Berechnen ist ein Fehler aufgetreten:</p><pre style="white-space:pre-wrap;font-size:12px;color:#c44536;background:#fdf3f2;padding:12px;border-radius:8px;">'+err.message+'\n\n'+err.stack+'</pre></div>';
    }
  }
  else { renderPlaceholder(step); }
}

function renderAll(){
  renderStepper();
  renderContent();
  btnBack.disabled = current === 0;
  btnBack.style.visibility = current === 0 ? 'hidden' : 'visible';
  btnNext.textContent = current === STEPS.length - 1 ? 'Fertig' : 'Weiter →';
  btnNext.disabled = current === STEPS.length - 1;
  window.scrollTo(0, 0);
}

btnNext.addEventListener('click', function(){
  maxReached = Math.max(maxReached, current+1);
  current = Math.min(current+1, STEPS.length-1);
  renderAll();
});

btnBack.addEventListener('click', function(){
  current = Math.max(current-1, 0);
  renderAll();
});

renderAll();
</script>
</body>
</html>
